<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Supervisor | AI Agent Interface</title>
    <meta name="description" content="Next-generation multi-agent orchestration and supervision interface.">
    <link rel="stylesheet" href="/static/css/index.css?v=5">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
</head>
<body>
    <div class="app">
        <header class="top">
            <div class="title">
                <div class="logo">🤖</div>
                <div>
                    <h1>Smart Supervisor</h1>
                    <div class="subtitle">Multi-Agent Orchestration Engine</div>
                </div>
            </div>
            <div class="tools">
                <button id="clearBtn" class="btn" title="대화 초기화">Clear History</button>
            </div>
        </header>
        <div id="status-progress" class="status-progress"></div>

        <main id="chat" class="chat">
            <div id="empty-state" class="empty-state">
                <div class="empty-state-icon">🤖</div>
                <div>
                    <h2>무엇을 도와드릴까요?</h2>
                    <p>Smart Supervisor가 멀티 에이전트를 오케스트레이션하여 복잡한 작업을 수행합니다.</p>
                </div>
                <div class="suggested-grid">
                    <div class="suggested-card" onclick="setPrompt('오늘 주요 일정 요약해줘')">
                        <span class="card-icon">📅</span>
                        <div class="card-title">일정 요약</div>
                        <div class="card-desc">오늘의 주요 일정과 할 일을 한눈에 정리합니다.</div>
                    </div>
                    <div class="suggested-card" onclick="setPrompt('기술 지원팀에 이메일 초안 작성해줘')">
                        <span class="card-icon">✉️</span>
                        <div class="card-title">이메일 작성</div>
                        <div class="card-desc">상황에 맞는 전문적인 이메일 초안을 작성합니다.</div>
                    </div>
                    <div class="suggested-card" onclick="setPrompt('최근 프로젝트 진행 상황 브리핑해줘')">
                        <span class="card-icon">📊</span>
                        <div class="card-title">프로젝트 브리핑</div>
                        <div class="card-desc">진행 중인 프로젝트의 핵심 지표를 요약합니다.</div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="bottom">
            <div class="bottom-container">
                <div class="composer">
                    <textarea id="prompt" placeholder="에이전트에게 명령을 입력하세요..." rows="1"></textarea>
                    <div class="composer-actions">
                        <button id="micBtn" class="mic-btn" title="음성 입력">🎤</button>
                        <button id="sendBtn" class="btn main" title="전송">↑</button>
                        <button id="stopBtn" class="mic-btn" title="중단" style="display:none;">⏹</button>
                    </div>
                </div>
                <div class="hint">
                    <span id="status-indicator" class="status-dot"></span>
                    <span id="status-text">준비 완료</span>
                    <span id="status-task" class="status-task"></span>
                </div>
            </div>
        </footer>
    </div>

    <!-- Immersive Voice Overlay -->
    <div id="voiceLayer" aria-hidden="true">
        <div class="aurora-bg"></div>
        <button id="voiceCloseBtn" class="voice-close-btn" aria-label="음성 인터페이스 닫기">×</button>
        <div id="voiceOrb" class="voice-orb"></div>
        <canvas id="voiceWaveform" class="voice-waveform"></canvas>
        <div id="voiceTranscriptLarge" class="voice-transcript-large">듣고 있습니다...</div>
    </div>

    <script src="/static/js/voice.js?v=6" defer></script>
    <script src="/static/js/app.js?v=6" defer></script>
</body>
</html>
