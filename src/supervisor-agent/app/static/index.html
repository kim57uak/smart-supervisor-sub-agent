<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A2A Supervisor Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <link rel="stylesheet" href="/static/libs/katex.min.css">
  <link rel="stylesheet" href="/static/a2ui/a2ui-core.css">
  <script src="/static/libs/katex.min.js"></script>
  <script src="/static/libs/auto-render.min.js"></script>
  <style>
    :root {
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --surface-elevated: #ffffff;
      --border-light: #e2e8f0;
      --border-medium: #cbd5e1;
      --text-primary: #1e293b;
      --text-secondary: #475569;
      --text-muted: #64748b;
      --accent-primary: #3b82f6;
      --accent-secondary: #8b5cf6;
      --accent-hover: #2563eb;
      --success: #10b981;
      --error: #ef4444;
      --warning: #f59e0b;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      margin: 0;
      height: 100dvh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--text-primary);
      background: var(--bg-primary);
      line-height: 1.6;
    }

    .app {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    .top {
      background: var(--surface-elevated);
      border-bottom: 1px solid var(--border-light);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }

    .title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      box-shadow: var(--shadow-md);
      font-size: 24px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
      font-weight: 400;
    }

    .tools {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    select, button, input, textarea {
      font: inherit;
    }

    #model {
      border: 1px solid var(--border-medium);
      background: var(--bg-secondary);
      color: var(--text-primary);
      border-radius: 8px;
      padding: 10px 16px;
      min-width: 180px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 500;
    }

    #model:hover {
      border-color: var(--accent-primary);
      box-shadow: var(--shadow-sm);
    }

    #model:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .btn {
      border: 1px solid var(--border-medium);
      border-radius: 8px;
      color: var(--text-primary);
      background: var(--bg-secondary);
      padding: 10px 18px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background: var(--bg-primary);
      border-color: var(--accent-primary);
      box-shadow: var(--shadow-sm);
    }

    .btn.main {
      background: var(--accent-primary);
      border: 1px solid var(--accent-primary);
      color: white;
      font-weight: 600;
      box-shadow: var(--shadow-md);
    }

    .btn.main:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
      box-shadow: var(--shadow-lg);
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 40px 32px;
      display: flex;
      flex-direction: column;
      gap: 28px;
      width: 100%;
      max-width: none;
      margin: 0;
    }

    .chat::-webkit-scrollbar {
      width: 10px;
    }

    .chat::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }

    .chat::-webkit-scrollbar-thumb {
      background: var(--border-medium);
      border-radius: 5px;
      border: 2px solid var(--bg-primary);
    }

    .chat::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .msg {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
    }

    .msg.user {
      flex-direction: row-reverse;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid var(--border-light);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      background: var(--bg-secondary);
      font-size: 20px;
      box-shadow: var(--shadow-sm);
    }

    .msg.user .avatar {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border: none;
    }

    .bubble {
      max-width: 100%;
      border-radius: 12px;
      padding: 18px 24px;
      background: var(--surface-elevated);
      border: 1px solid var(--border-light);
      line-height: 1.7;
      font-size: 15px;
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    .user .bubble {
      background: var(--surface-elevated);
      border: 1px solid var(--accent-primary);
      box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.1), var(--shadow-sm);
    }

    .bubble p {
      margin: 0.5em 0;
    }

    .bubble pre {
      background: #f1f5f9;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      overflow-x: auto;
      padding: 16px;
      margin: 12px 0;
    }

    .bubble code {
      background: #f1f5f9;
      border-radius: 4px;
      padding: 3px 7px;
      font-size: 0.9em;
      font-family: "SF Mono", "Consolas", "Monaco", monospace;
      color: var(--text-primary);
      border: 1px solid var(--border-light);
    }

    .bubble pre code {
      background: transparent;
      padding: 0;
      border: none;
    }

    .supervisor-panel {
      margin-bottom: 16px;
      padding: 16px 18px;
      border-radius: 10px;
      border: 1px solid var(--border-medium);
      background: #f8fafc;
      transition: all 0.3s ease;
      box-shadow: var(--shadow-sm);
    }

    .supervisor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .supervisor-title {
      font-size: 12px;
      color: var(--accent-primary);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .supervisor-title::before {
      content: '⚙️';
      font-size: 16px;
    }

    .supervisor-toggle {
      border: 1px solid var(--border-medium);
      background: var(--bg-secondary);
      color: var(--text-secondary);
      font-size: 11px;
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s;
      font-weight: 600;
    }

    .supervisor-toggle:hover {
      background: var(--bg-primary);
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .supervisor-progress-bar {
      height: 6px;
      background: var(--border-light);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .supervisor-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 3px;
      transition: width 0.3s ease, background 0.3s ease;
    }

    .supervisor-progress-fill.completed {
      background: var(--success);
    }

    .supervisor-current-stage {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 10px;
      padding: 8px 12px;
      background: var(--bg-secondary);
      border-radius: 6px;
      border-left: 3px solid var(--accent-primary);
    }

    .supervisor-stream {
      max-height: 140px;
      overflow-y: auto;
      font-size: 12px;
      line-height: 1.6;
      color: var(--text-secondary);
      white-space: pre-wrap;
      font-family: "SF Mono", "Consolas", "Monaco", monospace;
      background: var(--bg-secondary);
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid var(--border-light);
      scrollbar-width: thin;
      scrollbar-color: var(--border-medium) transparent;
    }

    .supervisor-stream::-webkit-scrollbar {
      width: 6px;
    }

    .supervisor-stream::-webkit-scrollbar-track {
      background: transparent;
    }

    .supervisor-stream::-webkit-scrollbar-thumb {
      background: var(--border-medium);
      border-radius: 3px;
    }

    .supervisor-stream:hover::-webkit-scrollbar-thumb {
      background: var(--text-muted);
    }

    .supervisor-panel.collapsed .supervisor-stream {
      display: none;
    }

    .supervisor-panel.collapsed .supervisor-progress-bar,
    .supervisor-panel.collapsed .supervisor-current-stage {
      display: block;
    }

    .assistant-answer:empty {
      min-height: 8px;
    }

    .review-panel {
      margin-top: 16px;
      padding: 16px;
      border-radius: 10px;
      border: 1px solid var(--warning);
      background: #fffbeb;
      display: none;
    }

    .review-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .review-title::before {
      content: '👤';
      font-size: 16px;
    }

    .review-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .review-progress {
      display: none;
      margin: 12px 0;
      padding: 12px;
      background: var(--bg-secondary);
      border-radius: 8px;
      border: 1px solid var(--border-light);
    }

    .review-progress.active {
      display: block;
    }

    .review-progress-label {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .review-progress-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border-medium);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .review-progress-bar {
      height: 6px;
      background: var(--border-light);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }

    .review-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 3px;
      width: 0%;
      transition: width 0.3s ease;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    .review-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn.approve {
      background: var(--success);
      border: 1px solid var(--success);
      color: white;
      position: relative;
      overflow: hidden;
    }

    .btn.approve:disabled,
    .btn.cancel:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn.approve:hover:not(:disabled) {
      background: #059669;
      border-color: #059669;
    }

    .btn.cancel {
      background: var(--error);
      border: 1px solid var(--error);
      color: white;
    }

    .btn.cancel:hover:not(:disabled) {
      background: #dc2626;
      border-color: #dc2626;
    }

    /* Math Equations */
    .katex-display {
      margin: 16px 0;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 8px 0;
    }

    .katex {
      font-size: 1.1em;
      color: var(--text-primary) !important;
    }

    .katex .base {
      color: var(--text-primary);
    }

    /* Inline math */
    .bubble p .katex {
      display: inline-block;
      vertical-align: middle;
    }

    /* Block math */
    .bubble .katex-display > .katex {
      display: block;
      text-align: center;
    }

    /* Markdown Lists */
    .bubble ul, .bubble ol {
      margin: 12px 0;
      padding-left: 24px;
    }

    .bubble ul {
      list-style-type: disc;
    }

    .bubble ol {
      list-style-type: decimal;
    }

    .bubble li {
      margin: 6px 0;
      line-height: 1.7;
    }

    /* Markdown Headings */
    .bubble h1, .bubble h2, .bubble h3,
    .bubble h4, .bubble h5, .bubble h6 {
      margin: 16px 0 8px 0;
      font-weight: 600;
      line-height: 1.3;
    }

    .bubble h1 { font-size: 1.5em; }
    .bubble h2 { font-size: 1.3em; }
    .bubble h3 { font-size: 1.1em; }

    /* Markdown Blockquote */
    .bubble blockquote {
      margin: 12px 0;
      padding: 8px 16px;
      border-left: 3px solid var(--border-subtle);
      background: rgba(0, 0, 0, 0.2);
      color: var(--text-secondary);
    }

    /* Markdown Tables */
    .bubble table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
    }

    .bubble table th,
    .bubble table td {
      border: 1px solid var(--border-subtle);
      padding: 8px 12px;
      text-align: left;
    }

    .bubble table th {
      background: rgba(0, 0, 0, 0.3);
      font-weight: 600;
    }

    .hint {
      background: var(--surface-elevated);
      border-top: 1px solid var(--border-light);
      padding: 14px 32px;
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Status Progress Bar */
    #status-progress {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg,
        rgba(59, 130, 246, 0.08),
        rgba(139, 92, 246, 0.08));
      transition: width 0.22s linear;
      z-index: 0;
      opacity: 0;
    }

    #status-progress.active {
      opacity: 1;
    }

    #status-progress::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg,
        transparent 0%,
        rgba(255, 255, 255, 0.28) 45%,
        transparent 100%);
      transform: translateX(-120%);
      opacity: 0;
    }

    #status-progress.active::after {
      opacity: 1;
      animation: statusSweep 1.6s linear infinite;
    }

    @keyframes statusSweep {
      to {
        transform: translateX(120%);
      }
    }

    #status {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    #status-task {
      color: var(--text-muted);
      font-weight: 500;
    }

    .status-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--text-muted);
      opacity: 0;
      transition: all 0.2s ease;
      position: relative;
    }

    .status-indicator.active {
      opacity: 1;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .status-indicator.active::after {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      border: 1px solid currentColor;
      opacity: 0.45;
      animation: pingRing 1.8s ease-out infinite;
    }

    @keyframes pingRing {
      0% {
        transform: scale(0.8);
        opacity: 0.5;
      }
      100% {
        transform: scale(1.8);
        opacity: 0;
      }
    }

    .status-indicator.streaming {
      background: var(--accent-primary);
      box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
    }

    .status-indicator.pending {
      background: var(--warning);
      box-shadow: 0 0 8px rgba(245, 158, 11, 0.5);
      animation: none;
    }

    .status-indicator.complete {
      background: var(--success);
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
      animation: none;
    }

    .status-indicator.error {
      background: var(--error);
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
      animation: none;
    }

    .status-indicator.pending::after,
    .status-indicator.complete::after,
    .status-indicator.error::after {
      animation: none;
      opacity: 0;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.3);
        opacity: 0.7;
      }
    }

    .input {
      background: var(--surface-elevated);
      border-top: 1px solid var(--border-light);
      padding: 24px 32px;
    }

    .input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
      max-width: 1000px;
      margin: 0 auto;
    }

    .composer {
      border: 1px solid var(--border-medium);
      border-radius: 14px;
      background: linear-gradient(180deg, #ffffff, #f8fbff);
      box-shadow: var(--shadow-sm);
      padding: 10px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .composer:focus-within {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    #prompt {
      width: 100%;
      min-height: 56px;
      max-height: 180px;
      resize: none;
      border: none;
      border-radius: 10px;
      padding: 10px 12px 8px;
      color: var(--text-primary);
      background: transparent;
      font-size: 15px;
      line-height: 1.5;
      transition: all 0.2s;
    }

    #prompt:focus {
      outline: none;
    }

    #prompt::placeholder {
      color: var(--text-muted);
    }

    .composer-meta {
      margin-top: 4px;
      padding: 0 10px 4px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .send-btn {
      min-width: 112px;
      height: 56px;
      border-radius: 12px;
      align-self: stretch;
    }

    @media (max-width: 1024px) {
      .top {
        padding: 16px 20px;
        gap: 14px;
      }

      .chat {
        padding: 24px 20px;
        gap: 20px;
      }

      .msg {
        max-width: 100%;
      }

      .input {
        padding: 18px 20px;
      }
    }

    @media (max-width: 768px) {
      .top {
        padding: 12px 16px;
        align-items: flex-start;
      }

      .title {
        width: 100%;
      }

      .logo {
        width: 40px;
        height: 40px;
        font-size: 20px;
      }

      h1 {
        font-size: 20px;
      }

      .subtitle {
        font-size: 12px;
      }

      .tools {
        width: 100%;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .tools .btn {
        width: 100%;
      }

      .chat {
        padding: 20px 16px;
        gap: 16px;
      }

      .bubble {
        padding: 12px 16px;
        font-size: 14px;
      }

      .supervisor-head {
        flex-wrap: wrap;
      }

      .supervisor-current-stage {
        font-size: 12px;
      }

      .supervisor-stream {
        max-height: 120px;
      }

      .hint {
        padding: 10px 14px;
        font-size: 12px;
      }

      #status {
        gap: 6px;
        line-height: 1.4;
      }

      #status-task {
        width: 100%;
      }

      .input {
        padding: 16px;
      }

      .input-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .send-btn {
        width: 100%;
        min-width: 0;
        height: 50px;
      }

      #model {
        width: 100%;
        min-width: 0;
        grid-column: 1 / -1;
      }

    }

    @media (max-width: 480px) {
      .chat {
        padding: 14px 10px;
        gap: 12px;
      }

      .msg {
        gap: 10px;
      }

      .avatar {
        width: 34px;
        height: 34px;
        font-size: 16px;
      }

      .bubble {
        padding: 10px 12px;
        font-size: 13px;
      }

      .composer {
        padding: 8px;
        border-radius: 12px;
      }

      #prompt {
        min-height: 52px;
        font-size: 14px;
        padding: 8px 10px 6px;
      }

      .composer-meta {
        padding: 0 8px 2px;
        font-size: 10px;
      }

      .tools {
        grid-template-columns: 1fr;
      }

      #model {
        grid-column: auto;
      }

      .composer-meta span:last-child {
        display: none;
      }

      .review-actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="title">
        <div class="logo">🤖</div>
        <div>
          <h1>A2A Supervisor</h1>
          <div class="subtitle">Enterprise AI Assistant • Real-time Streaming</div>
        </div>
      </div>
      <div class="tools">

        <button class="btn" id="stopBtn">중지</button>
        <button class="btn" id="clearBtn">초기화</button>
        <a class="btn" href="/index.html">홈</a>
      </div>
    </header>

    <section id="chat" class="chat"></section>
    <div class="hint">
      <div id="status-progress"></div>
      <div id="status">
        <span class="status-indicator" id="status-indicator"></span>
        <span id="status-text">준비됨</span>
        <span id="status-task"></span>
      </div>
    </div>

    <section class="input">
      <div class="input-row">
        <div class="composer">
          <textarea id="prompt" placeholder="메시지를 입력하세요..."></textarea>
          <div class="composer-meta">
            <span>Shift + Enter 줄바꿈</span>
            <span>Enter 전송</span>
          </div>
        </div>
        <button class="btn main send-btn" id="sendBtn">전송</button>
      </div>
    </section>
  </main>

  <script src="/static/a2ui/a2ui-renderer.js"></script>
  <script>
    marked.setOptions({
      gfm: true,
      breaks: true,
      pedantic: false,
      sanitize: false,
      smartLists: true,
      smartypants: false
    });
    mermaid.initialize({ startOnLoad: false, theme: 'dark' });

    const endpoint = '/a2a/supervisor/stream';
    const chatEl = document.getElementById('chat');
    const statusTextEl = document.getElementById('status-text');
    const statusTaskEl = document.getElementById('status-task');
    const statusIndicatorEl = document.getElementById('status-indicator');
    const statusProgressEl = document.getElementById('status-progress');
    const promptEl = document.getElementById('prompt');
    
    const sendBtn = document.getElementById('sendBtn');
    const clearBtn = document.getElementById('clearBtn');
    const stopBtn = document.getElementById('stopBtn');

    let streaming = false;
    let abortController = null;
    let sessionId = 'sess-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
    let a2uiEnabled = false; 
    let activeStreamTaskId = '';
    let statusTicking = false;
    let statusTargetProgress = 0;
    let statusDisplayProgress = 0;
    let statusLastUpdateAt = 0;

    function autoResizePrompt() {
      if (!promptEl) return;
      promptEl.style.height = 'auto';
      const nextHeight = Math.max(56, Math.min(180, promptEl.scrollHeight));
      promptEl.style.height = `${nextHeight}px`;
    }

    function updateStatusVisual(type) {
      statusIndicatorEl.className = 'status-indicator';
      statusProgressEl.classList.remove('active');

      if (type === 'streaming') {
        statusIndicatorEl.classList.add('active', 'streaming');
        statusProgressEl.classList.add('active');
      } else if (type === 'pending') {
        statusIndicatorEl.classList.add('active', 'pending');
        statusProgressEl.classList.add('active');
      } else if (type === 'complete') {
        statusIndicatorEl.classList.add('active', 'complete');
      } else if (type === 'error') {
        statusIndicatorEl.classList.add('active', 'error');
      }
    }

    function animateStatusProgress() {
      if (!statusTicking) return;
      const now = Date.now();
      if (now - statusLastUpdateAt > 1500 && statusTargetProgress < 94) {
        statusTargetProgress = Math.min(94, statusTargetProgress + 0.7);
      }
      if (statusDisplayProgress < statusTargetProgress) {
        statusDisplayProgress = Math.min(statusTargetProgress, statusDisplayProgress + 0.9);
      } else if (statusDisplayProgress > statusTargetProgress) {
        statusDisplayProgress = Math.max(statusTargetProgress, statusDisplayProgress - 1.2);
      }
      statusProgressEl.style.width = `${Math.max(0, Math.min(100, statusDisplayProgress)).toFixed(1)}%`;
      requestAnimationFrame(animateStatusProgress);
    }

    function beginStatusTicker() {
      if (statusTicking) return;
      statusTicking = true;
      statusLastUpdateAt = Date.now();
      requestAnimationFrame(animateStatusProgress);
    }

    function stopStatusTicker() {
      statusTicking = false;
    }

    function setStatus(text, type = 'ready', options = {}) {
      statusTextEl.textContent = text;
      statusTaskEl.textContent = options.activity ? `· ${options.activity}` : '';

      if (type === 'streaming') {
        updateStatusVisual('streaming');
        statusLastUpdateAt = Date.now();
        if (typeof options.progress === 'number') {
          statusTargetProgress = Math.max(statusTargetProgress, Math.min(99, options.progress));
        } else if (statusTargetProgress < 14) {
          statusTargetProgress = 14;
        }
        beginStatusTicker();
        return;
      }

      if (type === 'pending') {
        stopStatusTicker();
        updateStatusVisual('pending');
        const pendingProgress = typeof options.progress === 'number'
          ? Math.min(99, Math.max(0, options.progress))
          : Math.max(82, statusDisplayProgress);
        statusTargetProgress = pendingProgress;
        statusDisplayProgress = pendingProgress;
        statusProgressEl.style.width = `${pendingProgress}%`;
        return;
      }

      stopStatusTicker();
      updateStatusVisual(type);

      if (type === 'complete') {
        statusTargetProgress = 100;
        statusDisplayProgress = 100;
        statusProgressEl.style.width = '100%';
        setTimeout(() => {
          statusProgressEl.classList.remove('active');
        }, 1200);
      } else if (type === 'error') {
        statusTargetProgress = Math.max(statusTargetProgress, 100);
        statusDisplayProgress = 100;
        statusProgressEl.style.width = '100%';
      } else {
        statusTargetProgress = 0;
        statusDisplayProgress = 0;
        statusProgressEl.style.width = '0%';
      }
    }

    function addMessage(role, content) {
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;
      msg.innerHTML = `
        <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
        <div class="bubble">${content}</div>
      `;
      chatEl.appendChild(msg);
      chatEl.scrollTop = chatEl.scrollHeight;
      return msg.querySelector('.bubble');
    }

    function createAiResponseShell() {
      const bubble = addMessage('ai', '');
      bubble.innerHTML = `
        <div class="supervisor-panel" style="display:none;">
          <div class="supervisor-head">
            <span class="supervisor-title">Supervisor Progress</span>
            <button class="supervisor-toggle" type="button">접기</button>
          </div>
          <div class="supervisor-progress-bar">
            <div class="supervisor-progress-fill" style="width: 0%"></div>
          </div>
          <div class="supervisor-current-stage"></div>
          <div class="supervisor-stream"></div>
        </div>
        <div class="review-panel">
          <div class="review-title">HITL 승인 대기</div>
          <div class="review-desc"></div>
          <div class="review-progress">
            <div class="review-progress-label">
              <div class="review-progress-spinner"></div>
              <span class="review-progress-text">처리 중...</span>
            </div>
            <div class="review-progress-bar">
              <div class="review-progress-fill"></div>
            </div>
          </div>
          <div class="review-actions">
            <button class="btn approve" type="button">승인(APPROVE)</button>
            <button class="btn cancel" type="button">취소(CANCEL)</button>
          </div>
        </div>
        <div class="assistant-a2ui"></div>
        <div class="assistant-answer"></div>
      `;

      const panel = bubble.querySelector('.supervisor-panel');
      const stream = bubble.querySelector('.supervisor-stream');
      const toggle = bubble.querySelector('.supervisor-toggle');
      const answer = bubble.querySelector('.assistant-answer');
      const a2ui = bubble.querySelector('.assistant-a2ui');
      const progressFill = bubble.querySelector('.supervisor-progress-fill');
      const currentStage = bubble.querySelector('.supervisor-current-stage');
      const reviewPanel = bubble.querySelector('.review-panel');
      const reviewDesc = bubble.querySelector('.review-desc');
      const reviewProgress = bubble.querySelector('.review-progress');
      const reviewProgressText = bubble.querySelector('.review-progress-text');
      const reviewProgressFill = bubble.querySelector('.review-progress-fill');
      const approveBtn = bubble.querySelector('.btn.approve');
      const cancelBtn = bubble.querySelector('.btn.cancel');

      toggle.addEventListener('click', () => {
        panel.classList.toggle('collapsed');
        toggle.textContent = panel.classList.contains('collapsed') ? '펼치기' : '접기';
      });

      return {
        bubble, panel, stream, toggle, answer, a2ui, progressFill, currentStage,
        reviewPanel, reviewDesc, reviewProgress, reviewProgressText, reviewProgressFill,
        approveBtn, cancelBtn
      };
    }

    function renderAssistantMarkdown(target, text) {
      // 수식을 임시 플레이스홀더로 보호
      let protectedText = text;
      const mathBlocks = [];
      const mathInlines = [];

      protectedText = protectedText.replace(/\\\[([\s\S]*?)\\\]/g, (match, content) => {
        mathBlocks.push(content);
        return `MATHBLOCK${mathBlocks.length - 1}MATHBLOCK`;
      });
      protectedText = protectedText.replace(/\$\$([\s\S]*?)\$\$/g, (match, content) => {
        mathBlocks.push(content);
        return `MATHBLOCK${mathBlocks.length - 1}MATHBLOCK`;
      });

      protectedText = protectedText.replace(/\\\((.*?)\\\)/g, (match, content) => {
        mathInlines.push(content);
        return `MATHINLINE${mathInlines.length - 1}MATHINLINE`;
      });
      protectedText = protectedText.replace(/\$([^\$\n]+?)\$/g, (match, content) => {
        mathInlines.push(content);
        return `MATHINLINE${mathInlines.length - 1}MATHINLINE`;
      });

      let parsedHtml = marked.parse(protectedText);

      parsedHtml = parsedHtml.replace(/MATHBLOCK(\d+)MATHBLOCK/g, (match, index) => {
        return `\\[${mathBlocks[index]}\\]`;
      });
      parsedHtml = parsedHtml.replace(/MATHINLINE(\d+)MATHINLINE/g, (match, index) => {
        return `\\(${mathInlines[index]}\\)`;
      });

      target.innerHTML = parsedHtml;
    }

    function parseSseFrames(buffer) {
      const normalized = buffer.replace(/\r\n/g, '\n');
      const chunks = normalized.split('\n\n');
      return {
        frames: chunks.slice(0, -1),
        rest: chunks[chunks.length - 1] || ''
      };
    }

    function parseFrame(frame) {
      const lines = frame.split('\n');
      let event = 'message';
      const dataLines = [];
      for (const line of lines) {
        if (line.startsWith('event:')) event = line.slice(6).trim();
        if (line.startsWith('data:')) dataLines.push(line.slice(5).trim());
      }
      return { event, data: dataLines.join('\n') };
    }

    function normalizeNestedSse(event, data) {
      if (event !== 'message' || !data) {
        return { event, data };
      }

      if (data.startsWith('event:') || data.includes('\ndata:')) {
        const nested = parseFrame(data);
        if (nested.data) {
          return nested;
        }
      }

      // 서버 구현에 따라 plain message/data chunk만 내려오는 경우도 허용
      if (data === '[DONE]') {
        return { event: 'done', data: '{"reason":"completed"}' };
      }
      return { event: 'chunk', data };
    }

    // KaTeX 렌더링 함수
    function renderMath(element) {
      if (!element || !window.renderMathInElement) {
        console.warn('KaTeX not available');
        return;
      }
      try {
        renderMathInElement(element, {
          delimiters: [
            {left: "$$", right: "$$", display: true},
            {left: "\\[", right: "\\]", display: true},
            {left: "$", right: "$", display: false},
            {left: "\\(", right: "\\)", display: false}
          ],
          throwOnError: false
        });
        console.log('KaTeX rendered');
      } catch (e) {
        console.error('KaTeX render error:', e);
      }
    }

    // Mermaid 렌더링 함수
    async function renderMermaid(element) {
      if (!element) return;
      const mermaidBlocks = element.querySelectorAll('code.language-mermaid');
      for (let i = 0; i < mermaidBlocks.length; i++) {
        const code = mermaidBlocks[i].textContent;
        try {
          const id = `m-${Date.now()}-${i}`;
          const { svg } = await mermaid.render(id, code);
          const wrap = document.createElement('div');
          wrap.className = 'mermaid-diagram';
          wrap.innerHTML = svg;
          mermaidBlocks[i].parentElement.replaceWith(wrap);
          console.log('Mermaid rendered');
        } catch (e) {
          console.warn('Mermaid render error:', e);
        }
      }
    }

    async function enhanceBubble(bubble) {
      try {
        renderMath(bubble);
      } catch (e) {
        console.error('Math render error:', e);
      }

      try {
        await renderMermaid(bubble);
      } catch (e) {
        console.error('Mermaid render error:', e);
      }
    }

    /**
     * Supervisor 진행 상황 파싱 함수
     * 포맷: [supervisor] [stage] [progress%] message {metadata}
     */
    function parseSupervisorProgress(line) {
      // [supervisor] [stage] [progress%] message {key=value, ...}
      const pattern = /^\[supervisor\]\s+\[([^\]]+)\]\s+\[(\d+)%\]\s+(.+?)(?:\s+\{(.+)\})?$/;
      const match = line.match(pattern);

      if (!match) {
        return null;
      }

      const [, stage, progress, message, metadataStr] = match;
      const metadata = {};

      if (metadataStr) {
        // "key=value, key2=value2" 파싱
        metadataStr.split(',').forEach(entry => {
          const pair = entry.trim();
          if (!pair) return;
          const separatorIndex = pair.indexOf('=');
          if (separatorIndex < 0) return;
          const key = pair.slice(0, separatorIndex).trim();
          const value = pair.slice(separatorIndex + 1).trim();
          if (key) {
            metadata[key] = value;
          }
        });
      }

      return {
        stage,
        progress: parseInt(progress, 10),
        message,
        metadata
      };
    }

    /**
     * 단계명을 한글 레이블로 변환
     */
    function getStageLabel(stage) {
      const labels = {
        initializing: '🚀 초기화',
        analyzing: '🔍 분석',
        planning: '📋 계획',
        hitl: '🛡️ HITL 평가',
        hitl_waiting: '🧑 검토 대기',
        routing: '🎯 라우팅',
        invoking: '⚡ 실행',
        composing: '✨ 합성',
        completed: '✅ 완료',
        error: '❌ 오류'
      };
      return labels[stage] || stage;
    }

    function progressAgentDetail(progress) {
      if (!progress || !progress.metadata) return '';
      const md = progress.metadata;
      const parts = [];
      if (md.agentKey) parts.push(md.agentKey);
      if (md.method) parts.push(md.method);
      if (md.status) parts.push(md.status);
      if (parts.length === 0 && md.nodeType) parts.push(md.nodeType);
      return parts.join(' · ');
    }

    function stageLine(progress) {
      const detail = progressAgentDetail(progress);
      if (!detail) return `${getStageLabel(progress.stage)} - ${progress.message}`;
      return `${getStageLabel(progress.stage)} - ${progress.message} (${detail})`;
    }

    function isHitlWaitingProgress(progress) {
      if (!progress) return false;
      const stage = String(progress.stage || '').toLowerCase();
      const reviewStatus = String(progress.metadata?.reviewStatus || '').toUpperCase();
      return stage === 'hitl_waiting' || reviewStatus === 'WAITING_REVIEW';
    }

    function handleHitlWaitingProgress(ai, progress) {
      if (!isHitlWaitingProgress(progress)) return false;
      showHitlReviewPanel(
        ai,
        progress.metadata?.reason || progress.message,
        progress.metadata?.taskId || ''
      );
      setStatus('HITL 승인 대기 중', 'pending', {
        progress: Math.max(Number(progress.progress || 0), 82),
        activity: '사용자 결정 대기'
      });
      return true;
    }

    function finalizeHitlWaitingUi(ai, message, opts = {}) {
      const activity = opts.activity || '사용자 결정 대기';
      ai.progressFill.style.width = '100%';
      ai.currentStage.textContent = `🧑 검토 대기 - ${message}`;
      setStatus('HITL 승인 대기 중', 'pending', {
        progress: 100,
        activity
      });
    }

    function applySupervisorProgress(ai, progress, opts = {}) {
      if (!progress) return 0;
      const previous = Number(opts.lastProgress || 0);
      const pct = Math.max(previous, Math.min(100, Number(progress.progress || 0)));
      ai.progressFill.style.width = `${pct}%`;
      ai.currentStage.textContent = stageLine(progress);
      if (pct >= 100 || progress.stage === 'completed') {
        ai.progressFill.classList.add('completed');
      }

      const detail = progressAgentDetail(progress);
      const waitingReview = isHitlWaitingProgress(progress);
      setStatus(
        detail
          ? `${getStageLabel(progress.stage)} (${detail}, ${pct}%)`
          : `${getStageLabel(progress.stage)} (${pct}%)`,
        waitingReview ? 'pending' : 'streaming',
        {
          progress: waitingReview ? Math.max(pct, 82) : pct,
          activity: waitingReview ? '사용자 결정 대기' : progress.message
        }
      );
      return pct;
    }

    async function rpcCall(method, params) {
      const body = {
        jsonrpc: '2.0',
        id: `ui-rpc-${Date.now()}-${Math.floor(Math.random() * 1000)}`,
        method,
        params
      };
      const res = await fetch('/a2a/supervisor', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    }

    async function cancelActiveStreamTask(reason = 'stopped_from_ui') {
      if (!activeStreamTaskId) return false;
      const response = await rpcCall('tasks/cancel', {
        id: activeStreamTaskId,
        reason
      });
      if (response?.error) {
        throw new Error(response.error.message || 'Task cancel failed');
      }
      return true;
    }

    async function findLatestWaitingTaskId() {
      const listRes = await rpcCall('tasks/list', { limit: 30 });
      const tasks = listRes?.result?.tasks || [];
      const waiting = tasks.find(t => t.status === 'WAITING_REVIEW');
      return waiting?.id || '';
    }

    async function getTask(taskId) {
      const response = await rpcCall('tasks/get', { id: taskId });
      return response?.result || null;
    }

    async function waitForTaskTerminal(taskId, opts = {}) {
      const timeoutMs = Number(opts.timeoutMs || 120000);
      const intervalMs = Number(opts.intervalMs || 1000);
      const startedAt = Date.now();

      while (Date.now() - startedAt < timeoutMs) {
        const task = await getTask(taskId);
        const status = String(task?.status || '').toUpperCase();
        if (status === 'COMPLETED' || status === 'FAILED' || status === 'CANCELED') {
          return task;
        }
        await sleep(intervalMs);
      }
      throw new Error('승인 후 task 완료 대기 시간이 초과되었습니다.');
    }

    async function renderTaskOutcome(ai, task, decision) {
      if (task?.response) {
        const parsed = splitSupervisorPayload(String(task.response));
        if (parsed.logs.length > 0) {
          ai.panel.style.display = 'block';
          ai.panel.classList.remove('collapsed');
          ai.toggle.textContent = '접기';
          await replaySupervisorLogs(ai, parsed.logs);
        }
        if (parsed.answer.trim().length > 0) {
          renderAssistantMarkdown(ai.answer, parsed.answer.trim());
          await enhanceBubble(ai.answer);
        }
        const parsedA2ui = tryParseA2ui(parsed.a2ui);
        if (parsedA2ui) {
          renderA2ui(ai, parsedA2ui);
        }
      } else if (decision === 'CANCEL') {
        renderAssistantMarkdown(ai.answer, '요청이 검토 단계에서 취소되었습니다.');
      }
    }

    async function streamReviewDecision(ai, taskId, decision) {
      try {
        const decideRes = await rpcCall('tasks/review/decide', {
          task_id: taskId,
          decision: decision,
          session_id: sessionId,
          comment: ''
        });

        if (decideRes.result && decideRes.result.stream_endpoint) {
            a2uiEnabled = !!decideRes.result.a2ui_enabled;
            const streamEndpoint = decideRes.result.stream_endpoint;
            const cursor = decideRes.result.initial_cursor;
            
            const payload = {
                jsonrpc: '2.0',
                id: `ui-rpc-${Date.now()}`,
                method: 'tasks/events',
                params: {
                    task_id: taskId,
                    session_id: sessionId,
                    cursor: cursor
                }
            };
            
            const res = await fetch(streamEndpoint, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
              body: JSON.stringify(payload)
            });
            
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
              let fullAnswer = '';
              let reasoningText = '';
              let reasoningDone = false;

              ai.panel.style.display = 'block';

              while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const frames = parseSseFrames(buffer);
                buffer = frames.remainder || frames.rest || '';

                for (const frame of frames.completeFrames || frames.frames) {
                  const parsedOuter = parseFrame(frame);
                  if (!parsedOuter) continue;
                  
                  const { event, data } = normalizeNestedSse(parsedOuter.event, parsedOuter.data);
                  const eventType = event;
                  const parsed = data;

                  if (eventType === 'done' || eventType === 'error') {
                      finalizeHitlWaitingUi(ai, "완료");
                      if (fullAnswer) {
                          await enhanceBubble(ai.bubble);
                      }
                      setStatus(eventType === 'done' ? '처리 완료' : '에러 발생', eventType === 'done' ? 'complete' : 'error');
                      ai.panel.classList.add('collapsed');
                      ai.toggle.textContent = '펼치기';
                      return;
                  }
                  
                  if (eventType === 'progress') {
                      const stage = parsed.stage || '';
                      const msg = parsed.message || '';
                      ai.currentStage.textContent = `⚙️ ${stage} - ${msg}`;
                      setStatus(`${stage}...`, 'streaming', { progress: 40 });
                      chatEl.scrollTop = chatEl.scrollHeight;
                  }
                  
                  if (eventType === 'reasoning') {
                      const token = parsed.token || '';
                      reasoningText += token;
                      ai.panel.style.display = 'block';
                      ai.stream.textContent = reasoningText;
                      ai.stream.scrollTop = ai.stream.scrollHeight;
                      ai.currentStage.textContent = '🧠 LLM Reasoning...';
                      setStatus('추론 중...', 'streaming', { progress: 50 });
                      chatEl.scrollTop = chatEl.scrollHeight;
                  }
                  
                  if (eventType === 'a2ui') {
                      ai.answer.innerHTML = '';
                      renderA2ui(ai, parsed);
                      setStatus('UI 렌더링 완료', 'streaming', { progress: 80 });
                      chatEl.scrollTop = chatEl.scrollHeight;
                  }

                  if (eventType === 'chunk') {
                      const agent = parsed.agent || '';
                      const answer = parsed.data?.answer || parsed.answer || '';
                      
                      if (answer && typeof answer === 'string') {
                          const isMainBubbleTarget = (agent === 'supervisor');

                          if (isMainBubbleTarget) {
                              if (!reasoningDone && reasoningText) {
                                  reasoningDone = true;
                                  ai.currentStage.textContent = '✍️ 최종 답변 작성 중...';
                                  setTimeout(() => {
                                      if (ai.panel && !ai.panel.classList.contains('collapsed')) {
                                          ai.panel.classList.add('collapsed');
                                          ai.toggle.textContent = '펼치기';
                                      }
                                  }, 2000); 
                              }
                              fullAnswer += answer;
                              renderAssistantMarkdown(ai.answer, fullAnswer);
                          } else {
                              ai.panel.style.display = 'block';
                              if (!reasoningText.includes(`[${agent}]`)) {
                                  reasoningText += `\n[${agent}] `;
                              }
                              reasoningText += answer;
                              ai.stream.textContent = reasoningText;
                              ai.stream.scrollTop = ai.stream.scrollHeight;
                              setStatus(`${agent} 처리 중...`, 'streaming', { progress: 60 });
                          }
                          setStatus('응답 수신 중...', 'streaming', { progress: 70 });
                          chatEl.scrollTop = chatEl.scrollHeight;
                      }
                  }
                }
            }
        }
      } catch (err) {
        console.error(err);
        setStatus('에러 발생', 'error');
      }
    }

    async function handleReviewDecision(ai, taskId, decision) {
      // 버튼 비활성화
      ai.approveBtn.disabled = true;
      ai.cancelBtn.disabled = true;

      // 프로그레스 바 표시
      ai.reviewProgress.classList.add('active');
      ai.reviewProgressText.textContent = decision === 'APPROVE' ? '승인 처리 중...' : '취소 처리 중...';
      ai.reviewProgressFill.style.width = '30%';

      if (decision === 'APPROVE') {
        setStatus('승인 후 실행 시작...', 'streaming');
      }

      try {
        if (decision === 'APPROVE') {
          await streamReviewDecision(ai, taskId, decision);
          setTimeout(() => {
            ai.reviewProgress.classList.remove('active');
            ai.approveBtn.style.display = 'none';
            ai.cancelBtn.style.display = 'none';
          }, 1000);
          return;
        }

        // 50% 진행
        ai.reviewProgressFill.style.width = '50%';

        const decideRes = await rpcCall('tasks/review/decide', {
          task_id: taskId,
          decision,
          comment: decision === 'APPROVE' ? 'approved_from_ui' : 'canceled_from_ui',
          client_request_id: `ui-decision-${Date.now()}`
        });

        // 70% 진행
        a2uiEnabled = !!decideRes.result?.a2ui_enabled;
        ai.reviewProgressFill.style.width = '70%';

        if (decideRes?.error) {
          ai.reviewProgress.classList.remove('active');
          ai.reviewDesc.textContent = `결정 실패: ${decideRes.error.message || 'unknown error'}`;
          ai.approveBtn.disabled = false;
          ai.cancelBtn.disabled = false;
          return;
        }

	        const task = decideRes?.result?.task;
	        const review = decideRes?.result?.review;
	        let resolvedTask = task;
	        let taskStatus = String(task?.status || '').toUpperCase();

        // 90% 진행
        ai.reviewProgressFill.style.width = '90%';
        ai.reviewProgressText.textContent = '결과 처리 중...';

        if (decision === 'APPROVE' && taskStatus !== 'COMPLETED') {
          ai.reviewProgressText.textContent = '승인 후 실행 대기 중...';
          ai.reviewDesc.textContent = '승인은 완료되었습니다. 후속 실행 상태를 확인 중입니다.';
          resolvedTask = await waitForTaskTerminal(taskId);
          taskStatus = String(resolvedTask?.status || '').toUpperCase();
        }

        ai.reviewDesc.textContent = `결정 완료: ${review?.status || decision}`;
        await renderTaskOutcome(ai, resolvedTask, decision);

	        // 100% 완료
	        ai.reviewProgressFill.style.width = '100%';
	        ai.reviewProgressText.textContent = '완료';

	        if (decision === 'APPROVE' && taskStatus === 'COMPLETED') {
	          // replaySupervisorLogs가 상태를 'streaming'으로 변경했을 수 있으므로 다시 완료 상태로 설정
	          ai.progressFill.style.width = '100%';
	          ai.progressFill.classList.add('completed');
	          ai.currentStage.textContent = '✅ 완료 - 승인 후 실행이 정상 완료되었습니다.';
	          // 약간의 지연 후 완료 상태 설정하여 replaySupervisorLogs의 효과를 덮어씀
	          setTimeout(() => {
	            setStatus('완료', 'complete', {
	              progress: 100,
	              activity: '승인 후 실행 완료'
	            });
	          }, 100);
	        } else if (decision === 'CANCEL' && taskStatus === 'CANCELED') {
	          ai.currentStage.textContent = '🛑 검토 취소 - 요청이 검토 단계에서 종료되었습니다.';
	          setStatus('검토 취소', 'ready', {
	            progress: 0,
	            activity: '사용자 취소'
	          });
	        }

	        // 1초 후 프로그레스 바 숨기기
	        setTimeout(() => {
	          ai.reviewProgress.classList.remove('active');
	          ai.approveBtn.style.display = 'none';
	          ai.cancelBtn.style.display = 'none';
	        }, 1000);

	        if (!((decision === 'APPROVE' && taskStatus === 'COMPLETED')
	            || (decision === 'CANCEL' && taskStatus === 'CANCELED'))) {
	          setStatus(`Review ${decision} 완료`, 'complete');
	        }
	      } catch (e) {
        ai.reviewProgress.classList.remove('active');
        ai.reviewDesc.textContent = `결정 처리 실패: ${e.message}`;
        ai.approveBtn.disabled = false;
        ai.cancelBtn.disabled = false;
      }
    }

    function splitSupervisorPayload(payload) {
      const lines = String(payload || '').split('\n');
      const logs = [];
      const answerLines = [];
      const a2uiPayloads = [];
      for (const raw of lines) {
        const line = raw.trimEnd();
        if (line.trim().startsWith('[supervisor]')) {
          logs.push(line.trim());
        } else if (line.trim().startsWith('[[A2UI]]')) {
          a2uiPayloads.push(line.trim().slice('[[A2UI]]'.length));
        } else {
          answerLines.push(raw);
        }
      }
      return {
        logs,
        answer: answerLines.join('\n'),
        a2ui: a2uiPayloads.length > 0 ? a2uiPayloads[a2uiPayloads.length - 1] : null
      };
    }

    function tryParseA2ui(raw) {
      return window.A2uiRenderer?.tryParseProtocolPayload(raw) || null;
    }

    function renderA2ui(ai, envelope) {
      return window.A2uiRenderer?.render(ai, envelope, {
        onUserAction(payload) {
          if (payload) {
            void send(null, payload);
          }
        }
      });
    }

    function buildA2uiClientCapabilities() {
      return {
        supportedCatalogIds: [
          window.A2uiRenderer?.STANDARD_CATALOG_ID || 'https://a2ui.org/specification/v0_8/standard_catalog_definition.json'
        ]
      };
    }

    function buildTextMessagePayload(text) {
      return {
        parts: [
          { text, mediaType: 'text/plain' }
        ],
        metadata: {
          a2uiClientCapabilities: buildA2uiClientCapabilities()
        }
      };
    }

    function buildActionMessagePayload(actionPayload) {
      return {
        parts: [
          {
            data: actionPayload,
            mediaType: 'application/json+a2ui'
          }
        ],
        metadata: {
          a2uiClientCapabilities: buildA2uiClientCapabilities()
        }
      };
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function replaySupervisorLogs(ai, logs) {
      ai.stream.textContent = '';
      ai.progressFill.classList.remove('completed');
      let lastProgress = 0;

      for (const line of logs) {
        ai.stream.textContent += (ai.stream.textContent ? '\n' : '') + line;
        ai.stream.scrollTop = ai.stream.scrollHeight;

        const progress = parseSupervisorProgress(line);
        if (progress) {
          lastProgress = applySupervisorProgress(ai, progress, { lastProgress });
        }
        await sleep(90);
      }
    }

    function bindReviewTask(ai, taskId, reason) {
      ai.reviewDesc.textContent = `taskId=${taskId}${reason ? `, reason=${reason}` : ''}`;
      ai.approveBtn.style.display = '';
      ai.cancelBtn.style.display = '';
      ai.approveBtn.disabled = false;
      ai.cancelBtn.disabled = false;
      ai.approveBtn.onclick = () => handleReviewDecision(ai, taskId, 'APPROVE');
      ai.cancelBtn.onclick = () => handleReviewDecision(ai, taskId, 'CANCEL');
    }

    function showHitlReviewPanel(ai, reason, preferredTaskId = '') {
      ai.reviewPanel.style.display = 'block';
      if (preferredTaskId) {
        bindReviewTask(ai, preferredTaskId, reason);
        return;
      }

      ai.reviewDesc.textContent = '리뷰 대기 task를 조회 중입니다...';
      ai.approveBtn.disabled = true;
      ai.cancelBtn.disabled = true;
      ai.approveBtn.style.display = '';
      ai.cancelBtn.style.display = '';

      void (async () => {
        try {
          const taskId = await findLatestWaitingTaskId();
          if (!taskId) {
            ai.reviewDesc.textContent = '리뷰 대기 task를 찾지 못했습니다. 잠시 후 다시 시도해주세요.';
            ai.approveBtn.disabled = true;
            ai.cancelBtn.disabled = true;
            return;
          }
          bindReviewTask(ai, taskId, reason);
        } catch (e) {
          ai.reviewDesc.textContent = `리뷰 대기 task 조회 실패: ${e.message || e}`;
          ai.approveBtn.disabled = true;
          ai.cancelBtn.disabled = true;
        }
      })();
    }

    async function handleHitlReviewFallback(ai) {
      const taskId = await findLatestWaitingTaskId();
      if (!taskId) {
        ai.reviewPanel.style.display = 'block';
        ai.reviewDesc.textContent = '리뷰 대기 task를 찾지 못했습니다. 잠시 후 다시 시도해주세요.';
        ai.approveBtn.disabled = true;
        ai.cancelBtn.disabled = true;
        return;
      }
      bindReviewTask(ai, taskId, '');
    }

    async function send(overrideText, actionPayload) {
      if (streaming) return;
      const isUiEventArg = overrideText && typeof overrideText === 'object' && typeof overrideText.type === 'string';
      const normalizedOverrideText = isUiEventArg ? null : overrideText;
      const isAction = !!actionPayload;
      const text = String(normalizedOverrideText ?? promptEl.value).trim();
      if (!isAction && !text) return;

      if (!isAction) {
        addMessage('user', text.replace(/\n/g, '<br>'));
      }
      if (!isAction && normalizedOverrideText == null) {
        promptEl.value = '';
      }
      autoResizePrompt();
      streaming = true;
      abortController = new AbortController();
      statusTargetProgress = 0;
      statusDisplayProgress = 0;
      setStatus('요청 전송 중...', 'streaming', { progress: 10, activity: 'Supervisor 호출 준비' });

      const ai = createAiResponseShell();
      
      const payload = {
        jsonrpc: '2.0',
        id: `ui-${Date.now()}`,
        method: 'message/send',
        params: {
          session_id: sessionId,
          message: isAction ? JSON.stringify(actionPayload) : text
        }
      };

      try {
        const res = await fetch('/a2a/supervisor', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const rpcRes = await res.json();
        
        if (rpcRes.result && rpcRes.result.status === "WAITING_REVIEW") {
            a2uiEnabled = !!rpcRes.result.a2ui_enabled;
            showHitlReviewPanel(ai, rpcRes.result.review_reason || '사용자 승인이 필요합니다.', rpcRes.result.task_id);
            setStatus('사용자 승인 대기 중', 'pending');
            return;
        }
        
        // STREAMING: subscribe to SSE for real-time token streaming
        if (rpcRes.result && rpcRes.result.status === "STREAMING") {
            a2uiEnabled = !!rpcRes.result.a2ui_enabled;
            const taskId = rpcRes.result.task_id;
            const streamEndpoint = rpcRes.result.stream_endpoint || '/a2a/supervisor/stream';
            
            setStatus('응답 생성 중...', 'streaming', { progress: 20 });
            
            const ssePayload = {
                jsonrpc: '2.0',
                id: `ui-sse-${Date.now()}`,
                method: 'tasks/events',
                params: { task_id: taskId, session_id: sessionId, cursor: '0' }
            };
            
            const sseRes = await fetch(streamEndpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
                body: JSON.stringify(ssePayload)
            });
            
            if (!sseRes.ok) throw new Error(`SSE HTTP ${sseRes.status}`);
            
            const reader = sseRes.body.getReader();
            const decoder = new TextDecoder();
            let sseBuf = '';
            let fullAnswer = '';
            let reasoningText = '';
            let reasoningDone = false;
            
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                
                sseBuf += decoder.decode(value, { stream: true });
                const parts = sseBuf.split('\n\n');
                sseBuf = parts.pop() || '';
                
                for (const part of parts) {
                    const lines = part.split('\n');
                    let eventType = 'message';
                    let eventData = '';
                    
                    for (const line of lines) {
                        if (line.startsWith('event: ')) eventType = line.slice(7).trim();
                        else if (line.startsWith('data: ')) eventData = line.slice(6);
                    }
                    
                    if (!eventData) continue;
                    
                    let parsed;
                    try { parsed = JSON.parse(eventData); } catch { parsed = eventData; }
                    
                    if (eventType === 'done' || eventType === 'error') {
                        // 1. A2UI 우선 순위 판단: results를 순회하며 A2UI 데이터가 있는지 확인
                        let a2uiRendered = false;
                        if (parsed && parsed.results && Array.isArray(parsed.results)) {
                            for (const res of parsed.results) {
                                const rawData = res.payload?.data;
                                if (rawData && (rawData.a2ui || rawData.protocol === 'a2ui')) {
                                    const a2uiData = rawData.a2ui || rawData;
                                    // A2UI 렌더링 시 기존 스트리밍 답변 영역을 비움 (사용자 요구사항 반영)
                                    ai.answer.innerHTML = '';
                                    renderA2ui(ai, a2uiData);
                                    a2uiRendered = true;
                                    break;
                                }
                            }
                        }

                        // 2. A2UI가 없으면 compose 데이터(final_answer)로 최종 업데이트
                        if (!a2uiRendered && parsed && parsed.final_answer) {
                            renderAssistantMarkdown(ai.answer, parsed.final_answer);
                        }

                        // UI 마무리
                        if (reasoningText) {
                            ai.panel.classList.add('collapsed');
                            ai.toggle.textContent = '펼치기';
                        }
                        await enhanceBubble(ai.bubble);
                        setStatus(eventType === 'done' ? '완료' : '에러', eventType === 'done' ? 'complete' : 'error');
                        streaming = false;
                        return;
                    }
                    
                    if (eventType === 'progress') {
                        ai.panel.style.display = 'block';
                        const stage = parsed.stage || '';
                        const msg = parsed.message || '';
                        ai.currentStage.textContent = `⚙️ ${stage} - ${msg}`;
                        setStatus(`${stage}...`, 'streaming', { progress: 40 });
                        chatEl.scrollTop = chatEl.scrollHeight;
                    }
                    
                    if (eventType === 'reasoning') {
                        // Reasoning tokens → supervisor progress stream panel
                        const token = parsed.token || '';
                        reasoningText += token;
                        ai.panel.style.display = 'block';
                        ai.stream.textContent = reasoningText;
                        ai.stream.scrollTop = ai.stream.scrollHeight;
                        ai.currentStage.textContent = '🧠 LLM Reasoning...';
                        setStatus('추론 중...', 'streaming', { progress: 50 });
                        chatEl.scrollTop = chatEl.scrollHeight;
                    }
                    
                    if (eventType === 'a2ui') {
                        // Spring AI 스타일: A2UI 이벤트 수신 시 답변 영역을 비우고 렌더링
                        ai.answer.innerHTML = '';
                        renderA2ui(ai, parsed);
                        setStatus('UI 렌더링 완료', 'streaming', { progress: 80 });
                        chatEl.scrollTop = chatEl.scrollHeight;
                    }

                    if (eventType === 'chunk') {
                        // Spring AI 스타일 렌더링 선택 로직:
                        // a2ui.enabled == true  -> Bubble: Compose (supervisor), Panel: Raw Data (agents)
                        // a2ui.enabled == false -> Bubble: Raw Data (agents), Panel: Supervisor Compose
                        const agent = parsed.agent || '';
                        const answer = parsed.data?.answer || parsed.answer || '';
                        
                        if (answer && typeof answer === 'string') {
                            // Supervisor의 최종 합성 응답은 항상 메인 버블에 표시하고, 서브 에이전트의 로우 데이터는 패널에 표시함
                           const isMainBubbleTarget = (agent === 'supervisor');

                            if (isMainBubbleTarget) {
                                // 1. 메인 답변 영역 (Main Bubble)
                                if (!reasoningDone && reasoningText) {
                                    reasoningDone = true;
                                    ai.currentStage.textContent = '✍️ 최종 답변 작성 중...';
                                    setTimeout(() => {
                                        if (ai.panel && !ai.panel.classList.contains('collapsed')) {
                                            ai.panel.classList.add('collapsed');
                                            ai.toggle.textContent = '펼치기';
                                        }
                                    }, 2000); 
                                }
                                fullAnswer += answer;
                                renderAssistantMarkdown(ai.answer, fullAnswer);
                            } else {
                                // 2. 로그/추론 패널 (Progress Panel) - 격리 렌더링
                                ai.panel.style.display = 'block';
                                if (!reasoningText.includes(`[${agent}]`)) {
                                    reasoningText += `\n[${agent}] `;
                                }
                                reasoningText += answer;
                                ai.stream.textContent = reasoningText;
                                ai.stream.scrollTop = ai.stream.scrollHeight;
                                setStatus(`${agent} 처리 중...`, 'streaming', { progress: 60 });
                            }
                            setStatus('응답 수신 중...', 'streaming', { progress: 70 });
                            chatEl.scrollTop = chatEl.scrollHeight;
                        }
                    }
                }
            }
            
            // Stream ended without done event
            if (fullAnswer) {
                await enhanceBubble(ai.bubble);
            }
            setStatus('완료', 'complete');
            return;
        }
        
        setStatus('완료', 'complete');
      } catch (e) {
        console.error(e);
        setStatus('에러 발생', 'error');
        renderAssistantMarkdown(ai.answer, `오류 발생: ${e.message}`);
      } finally {
        streaming = false;
      }
    }

    sendBtn.addEventListener('click', () => {
      send();
    });
    stopBtn.addEventListener('click', async () => {
      try {
        if (activeStreamTaskId) {
          await cancelActiveStreamTask();
        }
      } catch (e) {
        console.warn('Failed to cancel active supervisor task:', e);
      } finally {
        if (abortController) abortController.abort();
      }
    });
    clearBtn.addEventListener('click', async () => {
      try {
        if (abortController) abortController.abort();
        sessionId = 'sess-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
        chatEl.innerHTML = '';
        setStatus('초기화됨', 'ready');
        addMessage('ai', '세션 히스토리를 초기화했습니다.');
      } catch (e) {
        setStatus(`초기화 실패: ${e.message}`, 'error');
      }
    });
    promptEl.addEventListener('keydown', (e) => {
      if (e.isComposing) return;
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });
    promptEl.addEventListener('input', autoResizePrompt);
    autoResizePrompt();

    addMessage('ai', '안녕하세요. A2A Supervisor에 오신 것을 환영합니다. 무엇을 도와드릴까요?');

    // 페이지 로드 시 라이브러리 확인
    window.addEventListener('load', () => {
      console.log('=== Library Check ===');
      console.log('marked:', typeof marked !== 'undefined' ? '✓' : '✗');
      console.log('mermaid:', typeof mermaid !== 'undefined' ? '✓' : '✗');
      console.log('katex:', typeof katex !== 'undefined' ? '✓' : '✗');
      console.log('renderMathInElement:', typeof renderMathInElement !== 'undefined' ? '✓' : '✗');
    });
  </script>
